<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card p-4" style="width:300px;">
  <h4>Login</h4>

  <input id="email" class="form-control mb-2" placeholder="Email">
  <input id="password" type="password" class="form-control mb-3" placeholder="Password">

  <button class="btn btn-primary" onclick="login()">Ingresar</button>

  <p id="error" class="text-danger mt-2"></p>
</div>

<script>
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch("http://localhost:3001/usuarios/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  if (res.ok) {
    const user = await res.json();

    localStorage.setItem("usuario", JSON.stringify(user));

    window.location.href = "index.html";
  } else {
    document.getElementById("error").innerText = "Login incorrecto";
  }
}
</script>

</body>
</html>
